services:
  postgresql:
    container_name: ms_pg_sql
    image: postgres
    environment:
      POSTGRES_USER: omerkoc
      POSTGRES_PASSWORD: omerkoc
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - flight-reservation-net
    restart: unless-stopped

  pgadmin:
    container_name: ms_pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - flight-reservation-net
    restart: unless-stopped

  mongo:
    image: mongo
    container_name: Mongo_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: omerkoc
      MONGO_INITDB_ROOT_PASSWORD: omerkoc
    networks:
      - flight-reservation-net
    volumes:
      - mongo:/data/db
    ports:
      - "27017:27017"

  mongo-express:
    image: mongo-express
    container_name: mongo_express
    restart: always
    environment:
      ME_CONFIG_MONGODB_SERVER: Mongo_db
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_MONGODB_ADMINUSERNAME: omerkoc
      ME_CONFIG_MONGODB_ADMINPASSWORD: omerkoc
      ME_CONFIG_BASICAUTH_USERNAME: omerkoc
      ME_CONFIG_BASICAUTH_PASSWORD: omerkoc
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    networks:
      - flight-reservation-net

networks:
  flight-reservation-net:
    driver: bridge

volumes:
  mongo:
  postgres:
  pgadmin:
